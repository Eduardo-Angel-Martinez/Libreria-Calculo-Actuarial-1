version: "3.8"

services:

  # Correr los tests
  tests:
    build: .
    command: python tests/test_firstact.py

  # Abrir el tutorial en Jupyter
  notebook:
    build: .
    command: jupyter notebook examples/firstact_tutorial.ipynb --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    ports:
      - "8888:8888"

  # Correr un script de ejemplo
  ejemplo:
    build: .
    command: python examples/ejemplo.py
